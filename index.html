<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TINTMATCH — Farbkorrektur-Assistent</title>
<style>
  :root{
    --bg:#15161a;
    --panel:#1e2024;
    --panel-2:#262930;
    --border:#383b42;
    --text:#eeeeec;
    --text-dim:#9a9ca5;
    --accent:#f2a93b;
    --accent-dim:#7a5d29;
    --good:#54e0bd;
    --good-dim:#1f4a3f;
    --bad:#e2574c;
    --mono: 'SFMono-Regular', 'Consolas', 'Liberation Mono', Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);height:100%;}
  body{-webkit-font-smoothing:antialiased;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative;}

  /* Header */
  header{padding:18px 18px 12px;border-bottom:1px solid var(--border);}
  .brand{display:flex;align-items:baseline;gap:8px;}
  .brand .mark{width:10px;height:10px;background:var(--accent);border-radius:1px;transform:rotate(45deg);flex:none;}
  .brand h1{font-family:var(--sans);font-weight:800;letter-spacing:0.06em;font-size:19px;margin:0;text-transform:uppercase;}
  .brand .sub{color:var(--text-dim);font-size:11.5px;letter-spacing:0.03em;margin-top:2px;}

  .steps{display:flex;gap:6px;padding:12px 18px 0;}
  .step-pill{flex:1;height:3px;border-radius:2px;background:var(--border);}
  .step-pill.done{background:var(--accent);}
  .step-pill.active{background:var(--good);}
  .step-labels{display:flex;justify-content:space-between;padding:6px 18px 14px;font-size:10px;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-dim);}
  .step-labels span.on{color:var(--text);}

  main{flex:1;display:flex;flex-direction:column;padding:16px 18px 100px;gap:16px;}

  h2.section-title{font-size:13px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin:0 0 2px;font-weight:700;}
  p.hint{font-size:13px;color:var(--text-dim);line-height:1.5;margin:0 0 4px;}

  /* Formula rows */
  .formula-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .formula-row{display:grid;grid-template-columns:1fr 74px 30px;gap:8px;margin-bottom:8px;align-items:center;}
  .formula-row input, .formula-row select{
    background:var(--panel-2);border:1px solid var(--border);color:var(--text);
    border-radius:7px;padding:9px 8px;font-size:14px;font-family:var(--mono);width:100%;
  }
  .formula-row select{font-family:var(--sans);font-size:13px;}
  .formula-row .pct{text-align:right;}
  .rm-btn{background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:7px;height:34px;cursor:pointer;font-size:15px;}
  .rm-btn:active{background:var(--panel-2);}
  .add-row{margin-top:4px;background:none;border:1px dashed var(--border);color:var(--accent);border-radius:7px;padding:9px;width:100%;font-size:13px;cursor:pointer;font-weight:600;letter-spacing:0.02em;}
  .meta-field{margin-top:12px;}
  .meta-field label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:5px;}
  .meta-field input{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:10px;font-size:14px;}

  /* Camera step */
  .cam-wrap{position:relative;width:100%;aspect-ratio:3/4;background:#000;border-radius:14px;overflow:hidden;border:1px solid var(--border);}
  video{width:100%;height:100%;object-fit:cover;display:block;}
  canvas.hidden-canvas{display:none;}
  .cam-overlay{position:absolute;inset:0;pointer-events:none;}
  .split-line{position:absolute;top:8%;bottom:16%;left:50%;width:2px;background:rgba(255,255,255,0.85);transition:background-color .2s, box-shadow .2s;}
  .split-line.locked{background:var(--good);box-shadow:0 0 10px var(--good);}
  .split-label{position:absolute;top:4%;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;color:rgba(255,255,255,0.85);text-shadow:0 1px 3px rgba(0,0,0,0.6);}
  .split-label.left{left:8%;}
  .split-label.right{right:8%;}

  .status-pill{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;font-weight:700;color:var(--accent);}
  .status-pill.ready{color:var(--good);border-color:var(--good-dim);}

  .angle-readout{position:absolute;bottom:100px;left:10px;right:10px;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;}
  .angle-readout .cur{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent);}
  .angle-readout .cur.ok{color:var(--good);}
  .angle-readout .target{font-family:var(--mono);font-size:11px;color:var(--text-dim);text-align:right;line-height:1.4;}
  .shutter-btn{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:68px;height:68px;border-radius:50%;background:rgba(0,0,0,0.35);border:3px solid rgba(255,255,255,0.85);pointer-events:auto;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .shutter-btn:active .shutter-inner{transform:scale(0.82);}
  .shutter-inner{width:52px;height:52px;border-radius:50%;background:#fff;transition:transform .1s ease;}

  .cam-controls{display:flex;gap:10px;margin-top:12px;}
  .btn{flex:1;padding:13px;border-radius:9px;border:none;font-size:14px;font-weight:700;letter-spacing:0.02em;cursor:pointer;text-transform:uppercase;font-family:var(--sans);}
  .btn-primary{background:var(--accent);color:#211405;}
  .btn-primary:disabled{opacity:0.4;}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--text);}
  .btn-good{background:var(--good);color:#062a20;}

  .cam-msg{font-size:12.5px;color:var(--text-dim);text-align:center;padding:6px 4px;}

  /* thumbnail review */
  .shot-preview{width:100%;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
  .shot-preview img{width:100%;display:block;}

  .crop-wrap{position:relative;width:100%;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:#000;touch-action:none;}
  .crop-wrap img{width:100%;display:block;user-select:none;-webkit-user-drag:none;}
  .crop-dim{position:absolute;background:rgba(0,0,0,0.55);pointer-events:none;}
  .crop-box{position:absolute;border:2px solid var(--accent);box-sizing:border-box;}
  .crop-handle{position:absolute;width:26px;height:26px;background:var(--accent);border-radius:50%;border:3px solid #16171a;touch-action:none;}
  .crop-handle[data-h="tl"]{left:-13px;top:-13px;cursor:nwse-resize;}
  .crop-handle[data-h="tr"]{right:-13px;top:-13px;cursor:nesw-resize;}
  .crop-handle[data-h="bl"]{left:-13px;bottom:-13px;cursor:nesw-resize;}
  .crop-handle[data-h="br"]{right:-13px;bottom:-13px;cursor:nwse-resize;}
  .shot-caption{display:flex;justify-content:space-between;align-items:center;padding:8px 2px 0;}
  .shot-caption .tag{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--good);font-weight:700;}
  .glare-warn{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:12.5px;line-height:1.5;background:#332612;border:1px solid var(--accent-dim);color:#f2d9a8;}
  .glare-warn.strong{background:#3a2320;border-color:var(--bad);color:#f3c1bc;}
  .retake{background:none;border:none;color:var(--text-dim);font-size:12px;text-decoration:underline;cursor:pointer;}

  .thumb-row{display:flex;gap:10px;}
  .thumb-row .shot-preview{aspect-ratio:3/4;}
  .thumb-row .shot-preview img{height:100%;object-fit:cover;}

  /* results */
  .diag-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .diag-card h3{margin:0 0 6px;font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);}
  .diag-card p{margin:0;font-size:14px;line-height:1.55;color:var(--text);}
  .adj-item{display:flex;gap:12px;padding:12px 0;border-top:1px solid var(--border);}
  .adj-item:first-child{border-top:none;}
  .adj-dir{width:34px;height:34px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;font-family:var(--mono);}
  .adj-dir.up{background:var(--good-dim);color:var(--good);}
  .adj-dir.down{background:#3a2320;color:var(--bad);}
  .adj-dir.new{background:var(--accent-dim);color:var(--accent);}
  .adj-body .code{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--text);}
  .adj-body .name{font-size:12.5px;color:var(--text-dim);margin-left:6px;}
  .adj-body .reason{font-size:13px;color:var(--text);margin-top:3px;line-height:1.45;}

  .disclaimer{font-size:11.5px;color:var(--text-dim);line-height:1.5;border-top:1px solid var(--border);padding-top:12px;}

  .nf-table{font-family:var(--mono);}
  .nf-row{display:grid;grid-template-columns:1.6fr 0.9fr 0.3fr 0.9fr;gap:6px;align-items:center;padding:9px 0;border-top:1px solid var(--border);font-size:13px;}
  .nf-row:first-child{border-top:none;}
  .nf-row.nf-head{font-family:var(--sans);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;padding-bottom:4px;}
  .nf-code{font-weight:700;}
  .nf-name{display:block;font-family:var(--sans);font-size:10.5px;color:var(--text-dim);font-weight:400;letter-spacing:0;}
  .nf-old{color:var(--text-dim);}
  .nf-arrow{color:var(--text-dim);text-align:center;}
  .nf-new{font-weight:700;}
  .nf-row.changed .nf-new{color:var(--good);}

  .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg, var(--bg) 60%, transparent);padding:18px 18px 22px;max-width:480px;margin:0 auto;}
  #app{padding-bottom:0;}

  .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,0.25);border-top-color:#211405;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--border);padding:10px 16px;border-radius:8px;font-size:13px;max-width:88%;text-align:center;z-index:50;}
</style>
</head>

</div>

TONER_DB.sort((a,b)=> parseInt(a.code.slice(1),10) - parseInt(b.code.slice(1),10));
const TONER_MAP = Object.fromEntries(TONER_DB.map(t=>[t.code,t]));

/* ---------------------------------------------------------------
   State
--------------------------------------------------------------- */
const state = {
  step: 0,
  formula: [],
  vehicleInfo: "",
  shots: { face:null, flop:null },
  stream: null,
  selectedDeviceId: null,
  analysis: null,
};

const TARGET_ANGLE = { face: 6, flop: 60 }; // beta≈0: flach von oben (Vogelperspektive) · beta≈60: flacher Streiflicht-Winkel
const TOLERANCE = 9;
const HOLD_MS = 1500;

const $main = document.getElementById('main');

/* ---------------------------------------------------------------
   Render router
--------------------------------------------------------------- */
function render(){
  document.querySelectorAll('.step-pill').forEach(p=>{
    const i = +p.dataset.step;
    p.classList.toggle('done', i < state.step);
    p.classList.toggle('active', i === state.step);
  });
  document.querySelectorAll('.step-labels span').forEach(s=>{
    s.classList.toggle('on', +s.dataset.step <= state.step);
  });

  stopCamera();
  if(state.step === 0) renderFormulaStep();
  else if(state.step === 1) renderCameraStep('face');
  else if(state.step === 2) renderCameraStep('flop');
  else renderAnalysisStep();
}

/* ---------------------------------------------------------------
   Step 0 — Formula
--------------------------------------------------------------- */
function renderFormulaStep(){
  const options = '<option value="" disabled selected>Toner wählen…</option>'
    + TONER_DB.map(t=>`<option value="${t.code}">${t.code} — ${t.name}</option>`).join('');
  $main.innerHTML = `
    <h2 class="section-title">Ausgangsrezeptur</h2>
    <p class="hint">Trage die aktuelle Formel des Musters ein, mit dem du den Kotflügel/das Bauteil abgleichst. Menge in Gramm, nur Punkt als Dezimaltrennzeichen (z. B. 3.6).</p>
    <div class="formula-card">
      <div id="rows"></div>
      <button class="add-row" id="addRow">+ Toner hinzufügen</button>
      <div class="meta-field">
        <label>Bauteile / Notiz (optional)</label>
        <input id="vehicleInfo" placeholder="z. B. Stoßstange vs. Kotflügel, VW T-Roc, Pure White" value="${state.vehicleInfo}">
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-primary" id="toFace" style="width:100%">Weiter zur Face-Aufnahme →</button>
    </div>
  `;
  const rowsEl = document.getElementById('rows');

  function sanitizeGram(raw){
    let v = raw.replace(/[^0-9.]/g,'');       // nur Ziffern und Punkt zulassen (kein Komma)
    const parts = v.split('.');
    if(parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
    return v;
  }

  function drawRows(){
    if(state.formula.length === 0){
      rowsEl.innerHTML = '<p class="hint" style="margin:4px 0 10px;">Noch keine Toner hinzugefügt.</p>';
      return;
    }
    rowsEl.innerHTML = `
      <div class="formula-row" style="margin-bottom:2px;">
        <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;">Toner</div>
        <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;text-align:right;">Menge (g)</div>
        <div></div>
      </div>
      ${state.formula.map((row,i)=>`
      <div class="formula-row" data-i="${i}">
        <select class="tonerSel">${options}</select>
        <input class="pct" type="text" inputmode="decimal" placeholder="z. B. 3.6" value="${row.g}">
        <button class="rm-btn">✕</button>
      </div>
    `).join('')}`;
    rowsEl.querySelectorAll('.formula-row[data-i]').forEach((rowEl)=>{
      const i = +rowEl.dataset.i;
      const sel = rowEl.querySelector('.tonerSel');
      sel.value = state.formula[i].code;
      sel.onchange = ()=> state.formula[i].code = sel.value;
      const pct = rowEl.querySelector('.pct');
      pct.oninput = ()=>{
        const clean = sanitizeGram(pct.value);
        pct.value = clean;
        state.formula[i].g = clean;
      };
      rowEl.querySelector('.rm-btn').onclick = ()=>{
        state.formula.splice(i,1); drawRows();
      };
    });
  }
  drawRows();
  document.getElementById('addRow').onclick = ()=>{
    state.formula.push({code:"", g:""}); drawRows();
  };
  document.getElementById('vehicleInfo').oninput = (e)=> state.vehicleInfo = e.target.value;
  document.getElementById('toFace').onclick = ()=>{
    const incomplete = state.formula.length === 0 || state.formula.some(r=>!r.code || r.g === "");
    if(incomplete){ showToast('Bitte bei jedem Toner Code und Menge angeben.'); return; }
    state.step = 1; render();
  };
}

/* ---------------------------------------------------------------
   Step 1 & 2 — Guided camera capture
--------------------------------------------------------------- */
function stopCamera(){
  if(state.stream){
    state.stream.getTracks().forEach(t=>t.stop());
    state.stream = null;
  }
  window.removeEventListener('deviceorientation', orientationHandler);
}

let holdStart = null;
let rafId = null;
let currentMode = null;
let orientationSupported = false;
let lastAngle = null;

function renderCameraStep(mode){
  currentMode = mode;
  const label = mode === 'face' ? 'FACE-WINKEL' : 'FLOP-WINKEL';
  const instructions = mode === 'face'
    ? 'Halte das lackierte Farbmuster links von der weißen Linie und das Bauteil (z. B. Kotflügel) rechts davon. Kamera senkrecht von oben — Vogelperspektive, wie beim Fotografieren eines Dokuments.'
    : 'Jetzt das Handy deutlich abflachen — ein flacher Streiflicht-Winkel, in etwa 60° zur Oberfläche.';
  const targetLabel = mode === 'face' ? 'ZIEL ~0–10° (Aufsicht)' : 'ZIEL ~60° (Streiflicht)';

  $main.innerHTML = `
    <h2 class="section-title">Aufnahme — ${label}</h2>
    <p class="hint">${instructions}</p>
    <div class="cam-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas class="hidden-canvas" id="canvas"></canvas>
      <div class="cam-overlay">
        <div class="status-pill" id="statusPill">Sensor wird kalibriert…</div>
        <div class="split-line" id="splitLine"></div>
        <div class="split-label left">Muster</div>
        <div class="split-label right">Bauteil</div>
        <div class="angle-readout">
          <div class="cur" id="curAngle">—°</div>
          <div class="target">${targetLabel}<br>Winkel ausrichten, dann Auslöser tippen</div>
        </div>
        <button class="shutter-btn" id="manualShot" aria-label="Foto auslösen"><span class="shutter-inner"></span></button>
      </div>
    </div>
    <div class="cam-msg" id="camMsg">Kamera wird gestartet…</div>
    <select id="camSelect" style="display:none;width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:9px;font-size:13px;margin-top:8px;"></select>
    <div class="cam-controls">
      <button class="btn btn-primary" id="enableTilt" style="width:100%">Neigungssensor aktivieren</button>
    </div>
  `;

  startCamera();
  document.getElementById('manualShot').onclick = ()=> capture(mode);
  document.getElementById('enableTilt').onclick = requestTilt;
}

async function listCameras(){
  try{
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d=>d.kind === 'videoinput');
    const sel = document.getElementById('camSelect');
    if(!sel || cams.length < 2) return; // nur anzeigen wenn Auswahl sinnvoll ist (z.B. Handy mit mehreren Objektiven)
    sel.style.display = 'block';
    sel.innerHTML = cams.map((c,i)=>{
      const label = c.label || `Kamera ${i+1}`;
      // Rückkamera meist zuerst / mit "back"/"rear" im Namen erkennbar
      return `<option value="${c.deviceId}">${label}</option>`;
    }).join('');
    // versuche automatisch die rückwärtige/Haupt-Kamera vorzuwählen
    const back = cams.find(c=>/back|rear|environment/i.test(c.label));
    if(back){ sel.value = back.deviceId; state.selectedDeviceId = back.deviceId; }
    sel.onchange = ()=>{ state.selectedDeviceId = sel.value; startCamera(); };
  }catch(e){ /* enumerateDevices kann vor erster Erlaubnis fehlschlagen, ignorieren */ }
}

async function startCamera(){
  if (!window.isSecureContext) {
    document.getElementById('camMsg').innerHTML =
      '⚠️ Kein Kamerazugriff: Diese Seite läuft nicht in einem "sicheren Kontext" (kein HTTPS, keine localhost-Adresse). '
      + 'Browser blockieren Kamera/Mikrofon grundsätzlich bei Dateien, die per Doppelklick als <code>file://…</code> geöffnet werden. '
      + 'Lies dir dazu die Hosting-Hinweise unterhalb der App-Vorschau durch — dort stehen die schnellsten Lösungen.';
    return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    document.getElementById('camMsg').textContent =
      '⚠️ Dieser Browser unterstützt keinen Kamerazugriff (getUserMedia fehlt). Bitte einen aktuellen Chrome/Safari/Firefox verwenden.';
    return;
  }
  if(state.stream){ state.stream.getTracks().forEach(t=>t.stop()); state.stream = null; }
  try{
    const videoConstraints = state.selectedDeviceId
      ? { deviceId:{ exact: state.selectedDeviceId }, width:{ideal:1280}, height:{ideal:1280} }
      : { facingMode:{ ideal:'environment' }, width:{ideal:1280}, height:{ideal:1280} };
    const stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints, audio:false });
    state.stream = stream;
    const video = document.getElementById('video');
    video.srcObject = stream;
    const track = stream.getVideoTracks()[0];
    const isFront = track && /front|user/i.test(track.label);
    document.getElementById('camMsg').textContent = isFront
      ? 'Kamera aktiv (Frontkamera — bei Laptops normal, da sie nur eine Kamera haben). Muster links, Bauteil rechts von der Linie.'
      : 'Kamera aktiv. Farbmuster links von der weißen Linie halten, Bauteil rechts.';
    requestTilt(); // try immediately (Android doesn't need explicit permission)
    listCameras(); // Labels sind erst nach erteilter Erlaubnis verfügbar
  }catch(err){
    let extra = '';
    if(err.name === 'NotAllowedError') extra = ' Prüfe die Kamera-Berechtigung für diese Seite in den Browser-/System-Einstellungen (evtl. wurde sie einmal abgelehnt und muss zurückgesetzt werden).';
    if(err.name === 'NotFoundError') extra = ' Es wurde keine Kamera gefunden.';
    if(err.name === 'NotReadableError') extra = ' Die Kamera wird evtl. gerade von einer anderen App benutzt.';
    if(err.name === 'OverconstrainedError'){ state.selectedDeviceId = null; extra = ' Gewählte Kamera nicht verfügbar, versuche Standardkamera erneut.'; }
    document.getElementById('camMsg').innerHTML =
      'Kein Kamerazugriff möglich (' + err.name + ': ' + err.message + ').' + extra;
  }
}

async function requestTilt(){
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
    try{
      const res = await DeviceOrientationEvent.requestPermission();
      if(res === 'granted') attachOrientation();
      else fallbackNoSensor();
    }catch(e){ fallbackNoSensor(); }
  } else if ('DeviceOrientationEvent' in window){
    attachOrientation();
  } else {
    fallbackNoSensor();
  }
}

function attachOrientation(){
  orientationSupported = true;
  window.addEventListener('deviceorientation', orientationHandler);
  const pill = document.getElementById('statusPill');
  if(pill) pill.textContent = 'Winkel wird gemessen…';
}

function fallbackNoSensor(){
  const pill = document.getElementById('statusPill');
  if(pill) pill.textContent = 'Kein Neigungssensor — manuell auslösen';
  const angleEl = document.getElementById('curAngle');
  if(angleEl) angleEl.textContent = 'n/a';
}

function orientationHandler(e){
  if(e.beta === null || currentMode === null) return;
  const beta = Math.abs(e.beta); // 0 = flach, 90 = senkrecht
  lastAngle = beta;
  const target = TARGET_ANGLE[currentMode];
  const diff = Math.abs(beta - target);
  const ok = diff <= TOLERANCE;

  const angleEl = document.getElementById('curAngle');
  const pill = document.getElementById('statusPill');
  const zL = document.getElementById('splitLine');
  if(!angleEl || !pill) return;

  angleEl.textContent = Math.round(beta) + '°';
  angleEl.classList.toggle('ok', ok);
  pill.classList.toggle('ready', ok);
  zL.classList.toggle('locked', ok);

  if(ok){
    pill.textContent = 'Ausgerichtet · Auslöser tippen';
  } else if(currentMode === 'face'){
    pill.textContent = beta > target ? 'Flacher halten (Aufsicht) ↓' : 'Leicht anheben ↑';
  } else {
    pill.textContent = beta < target ? 'Weiter aufrichten (flacher Winkel) ↑' : 'Etwas absenken ↓';
  }
}

function capture(mode){
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  if(!video || !video.videoWidth) return;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  state.shots[mode] = dataUrl;
  showToast(mode === 'face' ? 'Face-Winkel aufgenommen ✓' : 'Flop-Winkel aufgenommen ✓');
  stopCamera();
  renderReview(mode);
}

/* ---------------------------------------------------------------
   Blendungs-/Reflexions-Check — rein lokal per Canvas, kein KI-Aufruf,
   kostet also nichts. Erkennt großflächig überbelichtete (rein weiße)
   Bereiche, wie sie durch Klarlack-Spiegelungen entstehen.
--------------------------------------------------------------- */
function checkGlare(dataUrl){
  const img = new Image();
  img.onload = ()=>{
    const w = Math.min(img.naturalWidth, 300);
    const h = Math.round(img.naturalHeight * (w / img.naturalWidth));
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    let overexposed = 0;
    const data = ctx.getImageData(0, 0, w, h).data;
    const total = w * h;
    for(let i=0; i<data.length; i+=4){
      if(data[i] > 244 && data[i+1] > 244 && data[i+2] > 244) overexposed++;
    }
    const pct = Math.round((overexposed/total)*1000)/10;
    const el = document.getElementById('glareWarn');
    if(!el) return;
    if(pct > 6){
      el.className = 'glare-warn strong';
      el.innerHTML = `⚠️ Starke Reflexion erkannt (~${pct}% der Fläche überbelichtet). Der Klarlack spiegelt hier zu stark — an dieser Stelle geht Farbinformation verloren. Empfehlung: Polfilter aufs Objektiv, diffuses statt direktes Licht, oder Muster/Bauteil leicht drehen und neu aufnehmen.`;
    } else if(pct > 2){
      el.className = 'glare-warn';
      el.innerHTML = `⚠️ Leichte Reflexion erkannt (~${pct}%). Für ein noch saubereres Ergebnis: Blickwinkel oder Licht leicht anpassen.`;
    } else {
      el.className = '';
      el.innerHTML = '';
    }
  };
  img.onerror = ()=>{};
  img.src = dataUrl;
}

function renderReview(mode){
  const label = mode === 'face' ? 'Face-Winkel' : 'Flop-Winkel';
  $main.innerHTML = `
    <h2 class="section-title">${label} — Vorschau</h2>
    <div class="shot-preview">
      <img src="${state.shots[mode]}">
    </div>
    <div class="shot-caption">
      <span class="tag">Aufgenommen</span>
      <button class="retake" id="retake">Neu aufnehmen</button>
    </div>
    <div id="glareWarn"></div>
    <div class="cam-controls">
      <button class="btn btn-ghost" id="cropBtn" style="width:100%">✂ Zuschneiden (Umgebung entfernen)</button>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-primary" id="continueBtn" style="width:100%">
        ${mode === 'face' ? 'Weiter zu Flop-Winkel →' : 'Weiter zur Analyse →'}
      </button>
    </div>
  `;
  document.getElementById('retake').onclick = ()=>{ renderCameraStep(mode); };
  document.getElementById('cropBtn').onclick = ()=>{ renderCrop(mode); };
  document.getElementById('continueBtn').onclick = ()=>{
    state.step = mode === 'face' ? 2 : 3;
    render();
  };
  checkGlare(state.shots[mode]);
}

/* ---------------------------------------------------------------
   Zuschneiden — Rechteck mit 4 Eckgriffen per Pointer-Events
--------------------------------------------------------------- */
function renderCrop(mode){
  $main.innerHTML = `
    <h2 class="section-title">Zuschneiden</h2>
    <p class="hint">Ziehe die Ecken, um nur das Farbmuster + Bauteil im Bild zu behalten.</p>
    <div class="crop-wrap" id="cropWrap">
      <img id="cropImg" src="${state.shots[mode]}">
      <div class="crop-dim tl" id="dimTL"></div>
      <div class="crop-dim tr" id="dimTR"></div>
      <div class="crop-dim bl" id="dimBL"></div>
      <div class="crop-dim br" id="dimBR"></div>
      <div class="crop-box" id="cropBox">
        <div class="crop-handle" data-h="tl"></div>
        <div class="crop-handle" data-h="tr"></div>
        <div class="crop-handle" data-h="bl"></div>
        <div class="crop-handle" data-h="br"></div>
      </div>
    </div>
    <div class="cam-controls">
      <button class="btn btn-ghost" id="cancelCrop">Abbrechen</button>
      <button class="btn btn-primary" id="applyCrop">Zuschnitt übernehmen</button>
    </div>
  `;

  const wrap = document.getElementById('cropWrap');
  const box = document.getElementById('cropBox');
  const img = document.getElementById('cropImg');

  // Startrechteck: 10% Rand auf allen Seiten
  let rect = { x:0.1, y:0.1, w:0.8, h:0.8 }; // relative Koordinaten (0–1) zur Bildfläche

  function applyRectStyle(){
    const wrapRect = wrap.getBoundingClientRect();
    box.style.left = (rect.x * wrapRect.width) + 'px';
    box.style.top = (rect.y * wrapRect.height) + 'px';
    box.style.width = (rect.w * wrapRect.width) + 'px';
    box.style.height = (rect.h * wrapRect.height) + 'px';
    document.getElementById('dimTL').style.cssText = `left:0;top:0;right:${(1-rect.x)*100}%;bottom:${(1-rect.y)*100}%;`;
    document.getElementById('dimTR').style.cssText = `left:${(rect.x+rect.w)*100}%;top:0;right:0;bottom:${(1-rect.y)*100}%;`;
    document.getElementById('dimBL').style.cssText = `left:0;top:${(rect.y+rect.h)*100}%;right:${(1-rect.x)*100}%;bottom:0;`;
    document.getElementById('dimBR').style.cssText = `left:${(rect.x+rect.w)*100}%;top:${(rect.y+rect.h)*100}%;right:0;bottom:0;`;
  }
  img.onload = applyRectStyle;
  if(img.complete) applyRectStyle();
  window.addEventListener('resize', applyRectStyle);

  let dragHandle = null;
  box.querySelectorAll('.crop-handle').forEach(h=>{
    h.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      dragHandle = h.dataset.h;
      h.setPointerCapture(e.pointerId);
    });
  });
  box.addEventListener('pointermove', (e)=>{
    if(!dragHandle) return;
    const wrapRect = wrap.getBoundingClientRect();
    let px = (e.clientX - wrapRect.left) / wrapRect.width;
    let py = (e.clientY - wrapRect.top) / wrapRect.height;
    px = Math.max(0, Math.min(1, px));
    py = Math.max(0, Math.min(1, py));
    const MIN = 0.12;
    if(dragHandle === 'tl'){
      rect.w = rect.x + rect.w - px; rect.h = rect.y + rect.h - py;
      rect.x = px; rect.y = py;
    } else if(dragHandle === 'tr'){
      rect.w = px - rect.x; rect.h = rect.y + rect.h - py; rect.y = py;
    } else if(dragHandle === 'bl'){
      rect.w = rect.x + rect.w - px; rect.x = px; rect.h = py - rect.y;
    } else if(dragHandle === 'br'){
      rect.w = px - rect.x; rect.h = py - rect.y;
    }
    rect.w = Math.max(MIN, Math.min(rect.w, 1 - rect.x));
    rect.h = Math.max(MIN, Math.min(rect.h, 1 - rect.y));
    applyRectStyle();
  });
  box.addEventListener('pointerup', ()=> dragHandle = null);
  box.addEventListener('pointercancel', ()=> dragHandle = null);

  document.getElementById('cancelCrop').onclick = ()=> renderReview(mode);
  document.getElementById('applyCrop').onclick = ()=>{
    const natW = img.naturalWidth, natH = img.naturalHeight;
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(rect.w * natW);
    canvas.height = Math.round(rect.h * natH);
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, rect.x*natW, rect.y*natH, rect.w*natW, rect.h*natH, 0, 0, canvas.width, canvas.height);
    state.shots[mode] = canvas.toDataURL('image/jpeg', 0.9);
    renderReview(mode);
  };
}

/* ---------------------------------------------------------------
   Step 3 — Analysis (Claude vision call)
--------------------------------------------------------------- */
function renderAnalysisStep(){
  $main.innerHTML = `
    <h2 class="section-title">Analyse</h2>
    <div class="thumb-row">
      <div class="shot-preview"><img src="${state.shots.face}"></div>
      <div class="shot-preview"><img src="${state.shots.flop}"></div>
    </div>
    <div class="formula-card">
      <h2 class="section-title" style="margin-bottom:8px;">Aktuelle Formel</h2>
      ${state.formula.map(r=>{
        const t = TONER_MAP[r.code];
        return `<div style="font-family:var(--mono);font-size:13px;padding:4px 0;">${r.code} <span style="color:var(--text-dim)">— ${t?t.name:''}</span> <span style="float:right">${r.g} g</span></div>`;
      }).join('')}
    </div>
    <div id="resultZone"></div>
    <div class="bottom-bar" id="analyzeBar">
      <button class="btn btn-primary" id="runAnalysis" style="width:100%">KI-Farbanalyse starten</button>
    </div>
  `;
  document.getElementById('runAnalysis').onclick = runAnalysis;
}

async function runAnalysis(){
  const btn = document.getElementById('runAnalysis');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analysiere Face &amp; Flop…';

  const dbSnippet = TONER_DB.map(t=>`${t.code} (${t.fam}): ${t.name} — ${t.note}`).join('\n');
  const formulaSnippet = state.formula.map(r=>`${r.code} ${r.g} g`).join(', ');

  // STATISCHER Teil: identisch bei jeder Anfrage -> wird gecacht (10x günstiger ab dem 2. Aufruf).
  const staticSystemText = `Du bist ein erfahrener Farbtoner/Colorist für Autolack-Reparaturlackierung (PPG Envirobase High Performance, Wasserbasis).
Du bekommst zwei Fotos desselben Vergleichs: ein "Face"-Winkel-Foto (senkrechte Aufsicht von oben, wie beim Fotografieren eines Dokuments) und ein "Flop"-Winkel-Foto (flacher Streiflicht-Winkel, ca. 60° zur Oberfläche), jeweils mit dem selbst angemischten Farbmuster (in einem Rahmen) und dem originalen Fahrzeugbauteil direkt daneben im Bild.
Vergleiche Muster gegen Bauteil auf beiden Fotos bezüglich Helligkeit, Buntton, Sättigung und – falls Metallic/Perl sichtbar – Face/Flop-Verhalten der Flakes.
Berücksichtige: Handyfotos sind nicht farbkalibriert (Licht, Weißabgleich), daher gib nur qualitative, vorsichtige Einschätzungen, keine exakten numerischen Werte.
Hier ist die Toner-Referenzdatenbank (Code, Familie, Name, Charakteristik) als Nachschlagewerk, wähle Korrekturvorschläge NUR aus dieser Liste:
${dbSnippet}
Antworte AUSSCHLIESSLICH als JSON, ohne Markdown-Codeblock, in diesem Format:
{
  "diagnosis_face": "kurzer Absatz auf Deutsch, was auf dem Face-Winkel abweicht",
  "diagnosis_flop": "kurzer Absatz auf Deutsch, was auf dem Flop-Winkel abweicht",
  "adjustments": [
    {
      "code": "T-Code aus der Liste",
      "direction": "increase|decrease|add|remove",
      "percent": 15,
      "reason": "kurze Begründung auf Deutsch, max 2 Sätze, z.B. 'Farbe wirkt zu dunkel, bitte reduzieren'"
    }
  ],
  "confidence_note": "ein Satz zur Unsicherheit der Einschätzung (Beleuchtung/Kalibrierung)"
}
Regeln für "adjustments":
- "percent" ist die prozentuale Änderung der Menge (0-100), IMMER angeben bei increase/decrease, bezogen auf die aktuelle Gramm-Menge dieses Toners in der Rezeptur.
- Bei "code", der bereits in der aktuellen Rezeptur vorkommt: direction increase/decrease/remove.
- Bei "add" (neuer Toner, der noch nicht in der Rezeptur ist): percent bezieht sich stattdessen auf die Gesamtmenge der aktuellen Rezeptur (z.B. "add" mit percent 5 bedeutet ca. 5% der Gesamtmasse als Startmenge).
- Schlage nur wenige, gezielte Korrekturen vor (typischerweise 1-3), keine Änderung an jedem Toner.
- WICHTIG — ursächlichen Toner identifizieren: Schlage immer den Toner vor, der die auffälligste Abweichung tatsächlich verursacht, nicht pauschal irgendeinen naheliegenden Toner. Beispiele: Wirkt ein Blauton zu dunkel/schwärzlich, liegt das meist am Schwarzanteil (z.B. T405/T406/T407/T409) — diesen reduzieren. Wirkt ein Farbton zu milchig/blass/hell, liegt das meist am Weißanteil (z.B. T400/T402) — diesen reduzieren. Wirkt ein Farbton in die falsche Richtung verschoben (z.B. zu grün, zu rot, zu gelb), liegt das an einem Bunttoner dieser Familie — diesen anpassen. Denke wie ein erfahrener Colorist: welcher einzelne Toner in der Rezeptur erklärt die Abweichung am wahrscheinlichsten, und genau den anfassen.
- T491 (Matting Base) ZURÜCKHALTEND einsetzen: T491 verändert primär die Grobheit/den Flop der Metallic-Flakes, NICHT den eigentlichen Farbton. Schlage T491 nur vor, wenn es klar erkennbar um Textur/Grobheit/Flop-Charakter des Flakes geht — NIEMALS als Standardlösung, wenn eine Farbe schlicht zu hell oder zu dunkel wirkt. Helligkeit lässt sich in aller Regel sauberer über Schwarz-/Weißanteil oder den betroffenen Buntton korrigieren.`;

  // DYNAMISCHER Teil: ändert sich bei jeder Analyse (Rezeptur + Fotos) -> nicht gecacht.
  const dynamicText = `Aktuelle Rezeptur dieses Auftrags (Mengenangaben in Gramm): ${formulaSnippet}\nAnalysiere die folgenden zwei Fotos:`;

  try{
    const response = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: [
          { type:"text", text: staticSystemText, cache_control: { type:"ephemeral" } }
        ],
        messages: [{
          role: "user",
          content: [
            { type:"text", text: dynamicText },
            { type:"text", text:"Face-Winkel-Foto:" },
            { type:"image", source:{ type:"base64", media_type:"image/jpeg", data: state.shots.face.split(',')[1] } },
            { type:"text", text:"Flop-Winkel-Foto:" },
            { type:"image", source:{ type:"base64", media_type:"image/jpeg", data: state.shots.flop.split(',')[1] } },
          ]
        }]
      })
    });
    const data = await response.json();
    if(data.error){
      const msg = typeof data.error === 'string' ? data.error : (data.error.message || JSON.stringify(data.error));
      throw new Error(msg);
    }
    if(!data.content){
      throw new Error('Unerwartete Antwort vom Server: ' + JSON.stringify(data).slice(0,200));
    }
    const text = data.content.map(b=>b.text||"").join("\n").trim()
      .replace(/^```json/,'').replace(/```$/,'').trim();
    const parsed = JSON.parse(text);
    state.analysis = parsed;
    renderResult(parsed);
  }catch(err){
    document.getElementById('resultZone').innerHTML = `
      <div class="diag-card"><h3>Fehler</h3><p>Die Analyse konnte nicht abgeschlossen werden (${err.message}). Bitte erneut versuchen.</p></div>
    `;
    btn.disabled = false;
    btn.textContent = 'Erneut versuchen';
  }
}

function buildNewFormulaRows(adjustments){
  const map = new Map();
  state.formula.forEach(r=> map.set(r.code, { code:r.code, oldG: parseFloat(r.g)||0, newG: parseFloat(r.g)||0, changed:false }));
  const totalMass = Array.from(map.values()).reduce((s,v)=>s+v.oldG, 0);

  adjustments.forEach(adj=>{
    if(adj.direction === 'add'){
      const startG = Math.round(totalMass * ((adj.percent||0)/100) * 10) / 10;
      map.set(adj.code, { code:adj.code, oldG:0, newG:startG, changed:true, direction:'add', percent:adj.percent });
      return;
    }
    const entry = map.get(adj.code) || { code:adj.code, oldG:0, newG:0, changed:false };
    if(adj.direction === 'decrease'){
      entry.newG = Math.round(entry.oldG * (1 - (adj.percent||0)/100) * 10) / 10;
    } else if(adj.direction === 'increase'){
      entry.newG = Math.round(entry.oldG * (1 + (adj.percent||0)/100) * 10) / 10;
    } else if(adj.direction === 'remove'){
      entry.newG = 0;
    }
    entry.changed = true;
    entry.direction = adj.direction;
    entry.percent = adj.percent;
    map.set(adj.code, entry);
  });

  return Array.from(map.values());
}

function renderResult(a){
  document.getElementById('analyzeBar').style.display = 'none';
  const dirGlyph = {increase:'+', decrease:'–', add:'＋', remove:'✕'};
  const newRows = buildNewFormulaRows(a.adjustments);

  document.getElementById('resultZone').innerHTML = `
    <div class="diag-card">
      <h3>Face-Winkel</h3>
      <p>${a.diagnosis_face}</p>
    </div>
    <div class="diag-card">
      <h3>Flop-Winkel</h3>
      <p>${a.diagnosis_flop}</p>
    </div>
    <div class="diag-card">
      <h3>Korrekturvorschlag</h3>
      ${a.adjustments.map(adj=>{
        const t = TONER_MAP[adj.code] || {name:'', note:''};
        const cls = adj.direction === 'decrease' ? 'down' : (adj.direction === 'increase' ? 'up' : (adj.direction === 'add' ? 'new' : 'down'));
        const pctText = (adj.direction === 'increase' || adj.direction === 'decrease')
          ? `um ${adj.percent}% ${adj.direction === 'decrease' ? 'reduzieren' : 'erhöhen'}`
          : (adj.direction === 'add' ? `neu hinzufügen (~${adj.percent}% der Gesamtmasse)` : 'entfernen');
        return `
        <div class="adj-item">
          <div class="adj-dir ${cls}">${dirGlyph[adj.direction]||'~'}</div>
          <div class="adj-body">
            <span class="code">${adj.code}</span><span class="name">${t.name}</span>
            <div class="reason"><strong>${pctText}</strong> — ${adj.reason}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="diag-card">
      <h3>Neue Rezeptur (zum Notieren)</h3>
      <div class="nf-table">
        <div class="nf-row nf-head">
          <div>Toner</div><div>Alt</div><div></div><div>Neu</div>
        </div>
        ${newRows.map(r=>{
          const t = TONER_MAP[r.code] || {name:''};
          const isRemoved = r.direction === 'remove';
          return `
          <div class="nf-row ${r.changed?'changed':''}">
            <div class="nf-code">${r.code}<span class="nf-name">${t.name||''}</span></div>
            <div class="nf-old">${r.oldG.toFixed(1)} g</div>
            <div class="nf-arrow">${r.changed ? '→' : ''}</div>
            <div class="nf-new">${isRemoved ? 'entfernt' : r.newG.toFixed(1) + ' g'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="disclaimer">
      ${a.confidence_note}<br><br>
      Hinweis: Diese Einschätzung basiert auf unkalibrierten Handyfotos und ersetzt keine spektrophotometrische Messung. Trage Korrekturen in kleinen Schritten auf und prüfe jeweils mit einem neuen Spritzmuster.
    </div>
    <div class="bottom-bar">
      <button class="btn btn-ghost" id="restartBtn" style="width:100%">Neue Prüfung starten</button>
    </div>
  `;
  document.getElementById('restartBtn').onclick = ()=>{
    state.step = 0; state.shots = {face:null, flop:null}; state.analysis = null;
    render();
  };
}

function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 1800);
}

render();
</script>
</body>
</html>
